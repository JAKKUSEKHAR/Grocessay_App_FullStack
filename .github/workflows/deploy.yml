name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # ---------- BACKEND ----------
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'

      - name: Build Backend
        run: |
          cd E_COMMERCE_APPLICATION
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # ---------- FRONTEND ----------
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build Frontend
        run: |
          cd ecommerce-frontend
          npm install
          npm run build

      # ---------- DOCKER LOGIN ----------
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------- BACKEND IMAGE ----------
      - name: Build & Push Backend
        run: |
          docker build -t jakkusekhar/ecommerce-backend:latest ./E_COMMERCE_APPLICATION
          docker push jakkusekhar/ecommerce-backend:latest

      # ---------- FRONTEND IMAGE ----------
      - name: Build & Push Frontend
        run: |
          docker build -t jakkusekhar/ecommerce-frontend:latest ./ecommerce-frontend
          docker push jakkusekhar/ecommerce-frontend:latest